<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Contact — QR Code Generator Pro</title>
  <meta name="description" content="Contact QR Code Generator Pro for feedback or support.">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="brand">
      <div class="logo">QR</div>
      <div>
        <div style="font-weight:700">QR Code Generator Pro</div>
        <div style="font-size:12px;color:var(--muted)">Free & fast QR codes</div>
      </div>
    </div>
    <nav class="nav" aria-label="Main Navigation">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
      <a href="privacy-policy.html">Privacy</a>
      <a href="terms.html">Terms</a>
      <a href="blogs.html">Blogs</a>
    </nav>
  </header>

  <main class="container">
    <section class="card">
      <h1>Contact Us</h1>
      <p class="muted">Have a question or feedback? Send us a message — this form opens your email client. No messages are stored on this site.</p>

      <form id="contact-form" action="#" onsubmit="return submitForm(event)">
        <div style="display:flex;flex-direction:column;gap:10px">
          <input id="name" class="input" placeholder="Your name" required>
          <input id="email" class="input" placeholder="Your email" type="email" required>
          <textarea id="message" class="input" placeholder="Your message" style="min-height:120px;resize:vertical" required></textarea>
          <div style="display:flex;gap:8px">
            <button class="btn" type="submit">Send Message</button>
            <button class="btn ghost" type="reset">Reset</button>
          </div>
        </div>
      </form>

      <div class="footer">
        <div>© <span id="year-contact"></span> QR Code Generator Pro — <a href="privacy-policy.html">Privacy</a> • <a href="terms.html">Terms</a></div>
      </div>
    </section>
  </main>

  <script>
    document.getElementById('year-contact').textContent = new Date().getFullYear();
    function submitForm(e){
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const message = document.getElementById('message').value.trim();
      if(!name || !email || !message) return alert('Please complete all fields.');
      // Since there's no backend, open mail client via mailto
      const subject = encodeURIComponent('Contact from QR Code Generator Pro');
      const body = encodeURIComponent(`Name: ${name}\nEmail: ${email}\n\n${message}`);
      window.location.href = `mailto:contact@example.com?subject=${subject}&body=${body}`;
      return false;
    }
  </script>
</body>
</html>
